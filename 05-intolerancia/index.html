<style>
  .wrap-idx { max-width: 920px; margin: 0 auto; padding: 18px 20px 40px; }
  .wrap-idx header { padding-bottom: 8px; margin-bottom: 18px; }
  .wrap-idx h1 { margin: 0 0 6px; }
  .wrap-idx .lede { margin: 0 0 4px; }

  .idx-section-label {
    font-family: var(--sans); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.09em; color: var(--ink-muted);
    margin: 26px 0 12px;
  }
  .idx-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 14px;
  }
  .idx-card {
    display: flex; flex-direction: column; gap: 10px;
    padding: 18px 20px;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 10px;
    text-decoration: none; color: inherit;
    transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  }
  .idx-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
  }
  .idx-card-num {
    font-family: var(--sans); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-muted);
  }
  .idx-card h2 {
    font-family: var(--serif); font-size: 17px; font-weight: 600;
    line-height: 1.26; margin: 0; color: var(--ink);
  }
  .idx-card-go {
    font-family: var(--sans); font-size: 13px; font-weight: 600;
    color: var(--accent); margin-top: auto;
  }
  .idx-thumb {
    display: block; width: calc(100% + 40px); height: 150px; object-fit: cover;
    margin: -18px -20px 8px; border-radius: 10px 10px 0 0;
    border-bottom: 1px solid var(--rule); background: var(--bg-soft);
  }
  .idx-footer {
    margin-top: 34px; padding-top: 16px; border-top: 1px solid var(--rule);
    font-family: var(--sans); font-size: 12px; color: var(--ink-muted);
  }
  @media (max-width: 600px) {
    .idx-card h2 { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="wrap-idx">

  <header>
    <div class="top-bar">
      <div class="brand"><span class="brand-em" data-i18n="brand-name">El Atlas</span> · <span data-i18n="brand-tag">Cartografías del desarrollo</span> · <span data-i18n="issue-num">N°5</span></div>
      <div class="lang-toggle">
        <button data-lang="es" class="active">ES</button>
        <button data-lang="en">EN</button>
      </div>
    </div>
    <h1 data-i18n="page-title">¿El país más racista del mundo?</h1>
    <p class="lede" data-i18n="page-lede">Qué declaran las encuestas sobre la intolerancia en Argentina, América Latina y el mundo.</p>
    <div class="accent-rule"></div>
  </header>

  <div class="idx-section-label" data-i18n="index-charts-label">Gráficos interactivos</div>
  <div class="idx-grid">

    <a class="idx-card" href="./chart-ranking.html">
      <img class="idx-thumb" src="./thumbs/chart-ranking.png" data-thumb-es="./thumbs/chart-ranking.png" data-thumb-en="./thumbs/chart-ranking.en.png" alt="" loading="lazy" onerror="this.remove()">
      <span class="idx-card-num">Gráfico 1</span>
      <h2 data-i18n="c1-title-neutral">Los vecinos que cada sociedad rechaza</h2>
      <span class="idx-card-go" data-i18n="index-see">Ver gráfico →</span>
    </a>

  </div>

  <div class="idx-footer">
    <span data-i18n="attribution-text">El Atlas · Daniel Schteingart</span>
  </div>

</div>

<script src="../lib/i18n.js?v=2"></script>
<script src="./i18n-issue.js?v=3"></script>
<script>
  applyI18n();
  setupLangToggle(() => {
    document.querySelectorAll('.idx-thumb').forEach(img => {
      const src = (LANG === 'en') ? img.dataset.thumbEn : img.dataset.thumbEs;
      if (src) img.src = src;
    });
  });
</script>
<div id="chart-nav"></div>
<script src="./nav.js?v=3"></script>
